<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>예약하기</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#F8F9FE;font-family:Inter,'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',system-ui,sans-serif;color:#1F2024;min-height:100vh}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea{font:inherit;outline:none}
.wrap{max-width:480px;margin:0 auto;padding:0 20px 40px}
.hd{padding:28px 0 18px;text-align:center}
.hd .shop{font-size:24px;font-weight:800;letter-spacing:.01em}
.hd .sub{font-size:13px;color:#71727A;margin-top:6px;line-height:1.5}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px}
.lbl{font-size:13px;font-weight:700;color:#1F2024;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.lbl .step{width:20px;height:20px;border-radius:10px;background:#006FFD;color:#fff;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.cats{display:flex;gap:8px;margin-bottom:10px}
.cats button{font-size:13px;font-weight:600;color:#71727A;border:1px solid #C5C6CC;border-radius:99px;padding:7px 14px;background:#fff}
.cats button.on{color:#fff;background:#006FFD;border-color:#006FFD;font-weight:700}
.menus{display:flex;flex-direction:column;gap:8px}
.menus .mbtn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;background:#F8F9FE;border:1.5px solid transparent;text-align:left;width:100%}
.menus .mbtn.on{background:#EAF2FF;border-color:#006FFD}
.menus .mthumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex:none}
.menus .mname{font-size:14px;font-weight:700;color:#1F2024}
.menus .mbtn.on .mname{color:#006FFD}
.menus .mdesc{font-size:11px;color:#8F9098;line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.menus .min{font-size:11.5px;color:#8F9098;font-weight:500;flex:none;text-align:right;line-height:1.5}
.menus .mbtn.on .min{color:#006FFD}
.gallery{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none}
.gallery::-webkit-scrollbar{display:none}
.gallery img{height:108px;border-radius:12px;flex:none;cursor:pointer}
.ghint{font-size:10.5px;color:#8F9098;text-align:center;margin-top:2px}
#lightbox{position:fixed;inset:0;background:rgba(8,10,14,.93);display:flex;align-items:center;justify-content:center;z-index:99;flex-direction:column;gap:12px}
#lightbox img{max-width:94%;max-height:84%;border-radius:14px}
#lightbox .close{color:rgba(255,255,255,.8);font-size:13px;font-weight:600}
.dates{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.dates::-webkit-scrollbar{display:none}
.dates button{flex:none;width:58px;padding:10px 0;border-radius:12px;background:#F8F9FE;border:1.5px solid transparent;text-align:center}
.dates button .dow{font-size:11px;color:#8F9098;font-weight:600}
.dates button .day{font-size:16px;font-weight:800;margin-top:2px}
.dates button.on{background:#EAF2FF;border-color:#006FFD}
.dates button.on .dow,.dates button.on .day{color:#006FFD}
.dates button:disabled{opacity:.35}
.dates .sun .dow{color:#ED3241}
.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.slots button{padding:10px 0;border-radius:10px;background:#F8F9FE;border:1.5px solid transparent;font-size:13px;font-weight:600;text-align:center}
.slots button.on{background:#006FFD;color:#fff;font-weight:700}
.empty{text-align:center;color:#8F9098;font-size:13px;padding:18px 0}
.fld{margin-bottom:12px}
.fld .t{font-size:12px;font-weight:600;color:#2F3036;margin-bottom:6px}
.fld .t .opt{font-weight:400;color:#8F9098}
.fld input,.fld textarea{width:100%;border:1px solid #C5C6CC;border-radius:12px;padding:12px 14px;font-size:14px;background:#fff}
.fld input:focus,.fld textarea:focus{border:1.5px solid #006FFD}
.fld textarea{height:84px;resize:none;line-height:1.5}
.qopts{display:flex;gap:8px;flex-wrap:wrap}
.qopts button{padding:10px 16px;border-radius:10px;background:#F8F9FE;border:1.5px solid transparent;font-size:13px;font-weight:600}
.qopts button.on{background:#EAF2FF;border-color:#006FFD;color:#006FFD;font-weight:700}
.req{color:#ED3241}
.deposit{background:#FFF4E4;border-radius:12px;padding:12px 14px;font-size:12.5px;line-height:1.6;color:#494A50;margin-bottom:14px}
.deposit b{color:#E86339}
.cta{width:100%;height:54px;border-radius:14px;background:#006FFD;color:#fff;font-size:15px;font-weight:700;box-shadow:0 4px 12px rgba(0,111,253,.3)}
.cta:disabled{background:#C5C6CC;box-shadow:none}
.note{text-align:center;font-size:11px;color:#8F9098;margin-top:12px;line-height:1.6}
.done{padding:70px 20px;text-align:center}
.done .ic{width:76px;height:76px;border-radius:38px;background:#E7F4E8;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.done h2{font-size:20px;font-weight:800}
.done p{font-size:13.5px;color:#71727A;margin-top:10px;line-height:1.7}
.done .box{background:#fff;border-radius:16px;padding:16px 20px;margin-top:22px;text-align:left;font-size:13.5px;line-height:1.9}
.done .box b{color:#006FFD}
.loading{padding:80px 20px;text-align:center;color:#8F9098;font-size:14px}
.tap:active{transform:scale(.98);opacity:.9}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">불러오는 중…</div></div>

<script>
"use strict";
/* ============================================================
   ★ 설정 — Supabase 프로젝트 값 두 개만 붙여넣으면 됩니다 ★
   (Supabase 대시보드 → Settings → API 에서 복사)
   ============================================================ */
const SB_URL = "https://zkqueemnbssjwyddgdjx.supabase.co";
const SB_KEY = "sb_publishable__4TrdDAUOjWIF2qg2IM2RA_LQGpUl2v";

/* ------------------------------------------------------------ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const DOW=['일','월','화','수','목','금','토'];
const dateISO=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const toMin=t=>{const[a,b]=t.split(':').map(Number);return a*60+b;};
const toHM=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const fmtMin=min=>{const h=Math.floor((min||60)/60),m=(min||60)%60;return h?(m?`${h}시간 ${m}분`:`${h}시간`):`${m}분`;};
const fmtK=iso=>{const d=new Date(iso+'T00:00:00');return `${d.getMonth()+1}월 ${d.getDate()}일(${DOW[d.getDay()]})`;};

const SLUG=new URLSearchParams(location.search).get('s')||'suhvprg'; // 가게 구분 (기본 = 핀더)
let sb=null, CFG=null, TEAM=[]; // TEAM: 선생님 프로필 목록
let sel={cat:null,menu:null,date:null,time:null,answers:{},staff:'',name:'',phone:'',lookup:undefined};
let busyCache={}; // date -> [[startMin,endMin]]
async function doLookup(){ // 이름+전화로 내 지난 시술 확인
  const name=(sel.name||'').trim(), phone=(sel.phone||'').trim();
  if(!name||phone.replace(/[^\d]/g,'').length<10){ alert('이름과 연락처를 정확히 입력해주세요'); return; }
  sel.lookup='loading'; render();
  try{
    const {data,error}=await sb.rpc('customer_lookup',{p_slug:SLUG,p_phone:phone,p_name:name});
    sel.lookup=(error||!data)?null:data;
  }catch(e){ sel.lookup=null; }
  render();
}
function lookupCard(){
  const r=sel.lookup;
  let result='';
  if(r==='loading') result=`<div class="empty">확인 중…</div>`;
  else if(r===null) result=`<div style="font-size:12px;color:#8F9098;background:#F8F9FE;border-radius:10px;padding:10px 12px;margin-top:10px">기록을 찾지 못했어요 — 이름과 번호를 확인하시거나, 처음 방문이시면 그대로 예약해주세요 😊</div>`;
  else if(r) result=`<div style="margin-top:10px">
    <div style="font-size:13px;font-weight:700;color:#006FFD">💙 ${esc(r.name)}님, 다시 만나 반가워요! (총 ${r.visitCount||0}회 방문)</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
      ${(r.visits||[]).map(v=>{const d=new Date(v.date+'T00:00:00');return `<div style="display:flex;justify-content:space-between;align-items:center;background:#F8F9FE;border-radius:10px;padding:9px 12px;font-size:12.5px">
        <span style="color:#1F2024;font-weight:600">${esc(v.menu)}</span>
        <span style="color:#71727A">${d.getMonth()+1}/${d.getDate()} · <b style="color:#006FFD">${esc(v.staff)}</b></span></div>`;}).join('')||`<div class="empty">시술 기록이 아직 없어요</div>`}
    </div></div>`;
  return `<div class="card">
    <div class="lbl">🔎 다시 방문하셨나요? <span style="font-size:11px;font-weight:400;color:#8F9098">(지난 시술·담당 확인)</span></div>
    <div style="display:flex;gap:8px">
      <input placeholder="이름" value="${esc(sel.name||'')}" oninput="sel.name=this.value" style="flex:0.8;border:1px solid #C5C6CC;border-radius:10px;padding:10px 12px;font-size:13px">
      <input placeholder="010-0000-0000" inputmode="tel" value="${esc(sel.phone||'')}" oninput="sel.phone=this.value" style="flex:1.2;border:1px solid #C5C6CC;border-radius:10px;padding:10px 12px;font-size:13px">
      <button class="tap" style="flex:none;padding:0 14px;border-radius:10px;background:#EAF2FF;color:#006FFD;font-size:12.5px;font-weight:700" onclick="doLookup()">확인</button>
    </div>
    ${result}
  </div>`;
}
function shopQuestions(){ // 원장이 설정한 예약 질문 (없으면 기본 요청사항 1개)
  return (CFG.questions&&CFG.questions.length)?CFG.questions:[{label:'요청사항이 있나요?',type:'text',required:false}];
}
function qField(q,i){
  const v=sel.answers[i]||'';
  const mark=q.required?`<span class="req">*</span>`:`<span class="opt">(선택)</span>`;
  if(q.type==='yesno') return `<div class="fld"><div class="t">${esc(q.label)} ${mark}</div>
    <div class="qopts">${['예','아니오'].map(o=>`<button class="tap ${v===o?'on':''}" onclick="setAns(${i},'${o}')">${o}</button>`).join('')}</div></div>`;
  if(q.type==='choice') return `<div class="fld"><div class="t">${esc(q.label)} ${mark}</div>
    <div class="qopts">${(q.options||[]).map(o=>`<button class="tap ${v===o?'on':''}" onclick="setAns(${i},'${esc(o).replace(/'/g,"\\'")}')">${esc(o)}</button>`).join('')}</div></div>`;
  return `<div class="fld"><div class="t">${esc(q.label)} ${mark}</div>
    <textarea oninput="sel.answers[${i}]=this.value" placeholder="편하게 적어주세요">${esc(v)}</textarea></div>`;
}
function setAns(i,v){ sel.answers[i]=v; render(); }

async function boot(){
  if(SB_URL.includes('붙여넣기')){
    $('#app').innerHTML=`<div class="loading">예약 페이지가 아직 준비 중이에요 🙏<br>잠시 후 다시 방문해주세요.</div>`;
    return;
  }
  try{
    sb=window.supabase.createClient(SB_URL,SB_KEY);
    const {data,error}=await sb.from('shops').select('data').eq('slug',SLUG).single();
    if(error||!data) throw error||new Error('no config');
    CFG=data.data;
    document.title=(CFG.name||'예약')+' 예약';
    try{ // 담당 선생님 프로필(사진·소개)까지 최신으로
      const tm=await sb.rpc('shop_team',{p_slug:SLUG});
      if(!tm.error&&Array.isArray(tm.data)&&tm.data.length){
        TEAM=tm.data.filter(t=>t&&t.name);
        CFG.staff=[...new Set(TEAM.map(t=>t.name))];
      } else {
        const st=await sb.rpc('shop_staff',{p_slug:SLUG});
        if(!st.error&&st.data&&st.data.length){
          CFG.staff=[...new Set(st.data.map(x=>typeof x==='string'?x:(x&&Object.values(x)[0])))].filter(Boolean);
        }
      }
    }catch(e){}
    const firstCat=(CFG.cats||[]).length?CFG.cats[0]:null;
    sel.cat=firstCat;
    render();
  }catch(e){
    $('#app').innerHTML=`<div class="loading">예약 정보를 불러오지 못했어요.<br>주소를 다시 확인하거나 잠시 후 시도해주세요.</div>`;
  }
}

function catName(k){ return (CFG&&CFG.catDefs&&CFG.catDefs[k])||{nail:'네일',lash:'속눈썹'}[k]||k; }
function menusOf(cat){ return (CFG.menus||[]).filter(m=>m.cat===cat); }

function next14(){
  const out=[]; const now=new Date();
  for(let i=0;i<14;i++){
    const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+i);
    out.push({iso:dateISO(d),dow:d.getDay(),day:d.getDate(),closed:(CFG.closedDays||[]).includes(d.getDay())});
  }
  return out;
}

async function getBusy(date){
  if(busyCache[date]) return busyCache[date];
  const {data,error}=await sb.rpc('get_busy_slots',{p_date:date,p_shop:SLUG});
  const ranges=(error||!data)?[]:data.map(r=>[toMin(String(r.start_time).slice(0,5)),toMin(String(r.end_time).slice(0,5))]);
  busyCache[date]=ranges;
  return ranges;
}

function freeSlots(date,dur,busy){
  const open=toMin(CFG.open||'10:00'), close=toMin(CFG.close||'20:00'), step=CFG.slotMin||30;
  const out=[];
  const today=dateISO(new Date());
  const nowM=new Date().getHours()*60+new Date().getMinutes();
  for(let t=open;t+dur<=close;t+=step){
    if(date===today&&t<nowM+30) continue;           // 지난 시간 + 30분 이내 제외
    if(busy.some(([s,e])=>t<e&&t+dur>s)) continue;  // 겹치는 시간 제외
    out.push(t);
  }
  return out;
}

async function render(){
  const cats=CFG.cats||[];
  const menus=sel.cat?menusOf(sel.cat):(CFG.menus||[]);
  let slotsHTML=`<div class="empty">시술과 날짜를 먼저 선택해주세요</div>`;
  if(sel.menu&&sel.date){
    const busy=await getBusy(sel.date);
    const free=freeSlots(sel.date,sel.menu.min||60,busy);
    slotsHTML=free.length
      ?`<div class="slots">${free.map(t=>`<button class="tap ${sel.time===toHM(t)?'on':''}" onclick="pick('time','${toHM(t)}')">${toHM(t)}</button>`).join('')}</div>`
      :`<div class="empty">이 날은 가능한 시간이 없어요 😢<br>다른 날짜를 선택해주세요</div>`;
  }
  $('#app').innerHTML=`
  <div class="hd">
    ${CFG.logo?`<img src="${CFG.logo}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;box-shadow:0 4px 14px rgba(0,0,0,.1)">`:''}
    <div class="shop">${esc(CFG.name||'샵')}</div>
    <div class="sub">${esc(CFG.notice||'원하시는 시간을 선택해 예약을 요청해주세요.')}</div>
  </div>

  ${lookupCard()}

  <div class="card">
    <div class="lbl"><span class="step">1</span>시술 선택</div>
    ${cats.length>1?`<div class="cats">${cats.map(c=>`<button class="tap ${sel.cat===c?'on':''}" onclick="pickCat('${c}')">${catName(c)}</button>`).join('')}</div>`:''}
    <div class="menus">
      ${menus.map((m,i)=>{
        const on=sel.menu&&sel.menu.name===m.name;
        return `<button class="tap mbtn ${on?'on':''}" onclick="pickMenu('${sel.cat||m.cat}',${i})">
          ${m.photos&&m.photos[0]?`<img class="mthumb" src="${m.photos[0]}">`:''}
          <span style="flex:1;min-width:0">
            <span class="mname">${esc(m.name)}</span>
            ${m.desc?`<span class="mdesc">${esc(m.desc)}</span>`:''}
          </span>
          <span class="min">${fmtMin(m.min)}${m.price?`<br><b style="color:#006FFD">${m.price.toLocaleString('ko-KR')}원</b>`:''}</span>
        </button>
        ${on&&m.photos&&m.photos.length>1?`<div class="gallery">${m.photos.map(p=>`<img src="${p}" onclick="showImg(this.src)">`).join('')}</div><div class="ghint">사진을 누르면 크게 볼 수 있어요</div>`:''}`;
      }).join('')||`<div class="empty">등록된 메뉴가 없어요</div>`}
    </div>
  </div>

  ${(CFG.staff&&CFG.staff.length>1)?`<div class="card">
    <div class="lbl">👤 담당 선생님 <span style="font-size:11px;font-weight:400;color:#8F9098">(선택)</span></div>
    ${TEAM.length>1&&TEAM.some(t=>t.photo||t.intro)?`
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="tap" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;border:1.5px solid ${!sel.staff?'#006FFD':'transparent'};background:${!sel.staff?'#EAF2FF':'#F8F9FE'};text-align:left" onclick="sel.staff='';render()">
        <div style="width:44px;height:44px;border-radius:22px;background:#E8E9F1;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none">✨</div>
        <div style="font-size:13.5px;font-weight:700;color:${!sel.staff?'#006FFD':'#1F2024'}">아무나 괜찮아요</div>
      </button>
      ${TEAM.map(t=>{const on=sel.staff===t.name;return `<button class="tap" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;border:1.5px solid ${on?'#006FFD':'transparent'};background:${on?'#EAF2FF':'#F8F9FE'};text-align:left" onclick="sel.staff='${esc(t.name).replace(/'/g,"\\'")}';render()">
        ${t.photo?`<img src="${t.photo}" style="width:44px;height:44px;border-radius:22px;object-fit:cover;flex:none">`:`<div style="width:44px;height:44px;border-radius:22px;background:#EAF2FF;color:#006FFD;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex:none">${esc(t.name[0])}</div>`}
        <div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700;color:${on?'#006FFD':'#1F2024'}">${esc(t.name)}${t.role==='owner'?' <span style="font-size:10px">👑</span>':''}</div>
        ${t.intro?`<div style="font-size:11px;color:#71727A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.intro)}</div>`:''}</div>
      </button>`;}).join('')}
    </div>`
    :`<div class="qopts">
      <button class="tap ${!sel.staff?'on':''}" onclick="sel.staff='';render()">아무나 괜찮아요</button>
      ${CFG.staff.map(s=>`<button class="tap ${sel.staff===s?'on':''}" onclick="sel.staff='${esc(s).replace(/'/g,"\\'")}';render()">${esc(s)}</button>`).join('')}
    </div>`}
  </div>`:''}

  <div class="card">
    <div class="lbl"><span class="step">2</span>날짜 선택</div>
    <div class="dates">
      ${next14().map(d=>`<button class="tap ${sel.date===d.iso?'on':''} ${d.dow===0?'sun':''}" ${d.closed?'disabled':''} onclick="pick('date','${d.iso}')">
        <div class="dow">${d.dow===new Date().getDay()&&d.iso===dateISO(new Date())?'오늘':DOW[d.dow]}</div><div class="day">${d.day}</div></button>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="lbl"><span class="step">3</span>시간 선택</div>
    ${slotsHTML}
  </div>

  <div class="card">
    <div class="lbl"><span class="step">4</span>예약자 정보</div>
    <div class="fld"><div class="t">이름</div><input id="bkName" placeholder="이름을 입력해주세요" value="${esc(sel.name||'')}" oninput="sel.name=this.value"></div>
    <div class="fld"><div class="t">연락처</div><input id="bkPhone" inputmode="tel" placeholder="010-0000-0000" value="${esc(sel.phone||'')}" oninput="sel.phone=this.value"></div>
    ${shopQuestions().map((q,i)=>qField(q,i)).join('')}
  </div>

  ${CFG.deposit?`<div class="deposit"><b>💳 예약금 안내</b><br>${esc(CFG.deposit).replace(/\n/g,'<br>')}</div>`:''}

  <button class="cta tap" onclick="submitBooking()">예약 요청하기</button>
  <div class="note">요청 후 원장님이 확인하면 <b>문자로 확정 안내</b>를 드려요.<br>확정 전까지는 예약이 완료된 것이 아니에요.</div>`;
}

function showImg(src){ // 사진 크게 보기
  const el=document.createElement('div'); el.id='lightbox';
  el.innerHTML=`<img src="${src}"><div class="close">탭해서 닫기</div>`;
  el.onclick=()=>el.remove();
  document.body.appendChild(el);
}
function pickCat(c){ sel.cat=c; sel.menu=null; sel.time=null; render(); }
function pickMenu(cat,i){ sel.menu=menusOf(cat)[i]; sel.time=null; render(); }
function pick(k,v){ sel[k]=v; if(k==='date') sel.time=null; render(); }

async function submitBooking(){
  const name=(sel.name||'').trim(), phone=(sel.phone||'').trim();
  if(!sel.menu){ alert('시술을 선택해주세요'); return; }
  if(!sel.date||!sel.time){ alert('날짜와 시간을 선택해주세요'); return; }
  if(!name){ alert('이름을 입력해주세요'); return; }
  if(phone.replace(/[^\d]/g,'').length<10){ alert('연락처를 정확히 입력해주세요'); return; }
  const qs=shopQuestions();
  for(let i=0;i<qs.length;i++){ // 필수 질문 검사
    if(qs[i].required&&!String(sel.answers[i]||'').trim()){ alert(`"${qs[i].label}"에 답해주세요`); return; }
  }
  const answers=qs.map((q,i)=>({q:q.label,a:String(sel.answers[i]||'').trim()})).filter(x=>x.a);
  const note=answers.map(x=>`${x.q}: ${x.a}`).join('\n');
  const dur=sel.menu.min||60;
  const end=toHM(toMin(sel.time)+dur);
  const btn=document.querySelector('.cta'); btn.disabled=true; btn.textContent='요청 중…';
  const row={
    shop_id:SLUG, name, phone, cat:sel.menu.cat||sel.cat, menu:sel.menu.name,
    duration_min:dur, date:sel.date, start_time:sel.time, end_time:end,
    note, answers, staff:sel.staff||'', status:'pending', source:'link'
  };
  let {error}=await sb.from('bookings').insert(row);
  if(error&&String(error.message||'').includes('staff')){ delete row.staff; ({error}=await sb.from('bookings').insert(row)); }
  if(error){ btn.disabled=false; btn.textContent='예약 요청하기'; alert('요청에 실패했어요. 잠시 후 다시 시도해주세요.'); return; }
  $('#app').innerHTML=`
  <div class="done">
    <div class="ic"><svg width="34" height="34" viewBox="0 0 32 32" fill="none" stroke="#298267" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l6 6L25 11"/></svg></div>
    <h2>예약 요청 완료!</h2>
    <p>원장님이 확인하는 대로<br><b>문자로 확정 안내</b>를 드릴게요.</p>
    <div class="box">
      📅 <b>${fmtK(sel.date)} ${sel.time}</b><br>
      💅 ${esc(sel.menu.name)} (${fmtMin(dur)})${sel.staff?`<br>👤 ${esc(sel.staff)} 선생님 지명`:''}<br>
      👤 ${esc(name)}
      ${CFG.deposit?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #F8F9FE;font-size:12.5px;color:#71727A">${esc(CFG.deposit).replace(/\n/g,'<br>')}</div>`:''}
    </div>
  </div>`;
  window.scrollTo(0,0);
}

boot();
</script>
</body>
</html>
